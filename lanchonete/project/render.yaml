services:
  - type: web
    name: lanchonete-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lanchonete-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lanchonete-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT

  - type: worker
    name: lanchonete-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lanchonete-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lanchonete-redis
          type: redis
          property: connectionString

databases:
  - name: lanchonete-db
    plan: free

  - name: lanchonete-redis
    plan: free
    ipAllowList: []
